<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🦁 Lion Chess</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1209;}
body{font-family:Georgia,serif;}
button{border:none;cursor:pointer;font-family:inherit;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

/* SCREENS */
.pg{display:none;position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.pg.on{display:flex;}

/* ANIMATIONS */
@keyframes lionBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes checkPulse{0%,100%{background:#450a0a}50%{background:#991b1b}}
@keyframes eloFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
@keyframes badgeSlide{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes starPop{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes pieceLand{0%{transform:scale(1.2);opacity:.6}100%{transform:scale(1);opacity:1}}

/* TOAST */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-60px);z-index:9900;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;pointer-events:none;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.7);}
#toast.show{transform:translateX(-50%) translateY(0);}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:800;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);animation:fadeUp .2s ease;}
.sheet{background:linear-gradient(180deg,#1c1c1c,#111);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:sheetUp .28s cubic-bezier(.175,.885,.32,1.275);padding-bottom:env(safe-area-inset-bottom,20px);}
.pill-bar{width:38px;height:4px;background:#2a2a2a;border-radius:2px;margin:13px auto 0;}

/* BUTTONS */
.hbtn{width:100%;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:12px;color:#fff;text-align:left;transition:transform .12s;position:relative;overflow:hidden;}
.hbtn:active{transform:scale(.96);}
.abtn{border-radius:11px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s;flex:1;}
.abtn:active{transform:scale(.9);}

/* BOARD */
.sq{display:inline-flex;align-items:center;justify-content:center;position:relative;transition:background .06s;}
.sq:active{filter:brightness(1.1);}
.ldot{position:absolute;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none;}
.lring{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3;}
.coord{position:absolute;font-size:9px;font-weight:700;opacity:.5;pointer-events:none;line-height:1;font-family:monospace;}
.rdot{position:absolute;top:2px;right:2px;width:12px;height:12px;border-radius:50%;z-index:6;pointer-events:none;}
.piece{display:flex;align-items:center;justify-content:center;pointer-events:none;transition:transform .14s cubic-bezier(.175,.885,.32,1.275);}
.piece.land{animation:pieceLand .18s ease;}

/* REVIEW BADGES */
.rv{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;}
.ex{background:#14532d33;color:#4ade80;border:1px solid #4ade8044;}
.go{background:#1e3a5f33;color:#60a5fa;border:1px solid #60a5fa44;}
.in{background:#78350f33;color:#fb923c;border:1px solid #fb923c44;}
.mi{background:#4a194233;color:#f0abfc;border:1px solid #f0abfc44;}
.bl{background:#450a0a33;color:#fca5a5;border:1px solid #fca5a544;}

/* SPINNER */
.spin{width:16px;height:16px;border:2px solid #333;border-top-color:#facc15;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
</style>
</head>
<body>

  cv.width=w;cv.height=h;const ctx=cv.getContext("2d");ctx.clearRect(0,0,w,h);

function renderPuzBoard(cs){
  const wrap=document.getElementById("puzBrd");if(!wrap)return;
  const board=G.puzBoard,bt=BT();let html="";
  for(let r=0;r<8;r++){html+=`<div style="display:flex;">`;
    for(let c=0;c<8;c++){
      const p=board[r][c],lt=(r+c)%2===0;
      const isSl=G.puzSel&&G.puzSel[0]===r&&G.puzSel[1]===c;
      const isL=G.puzLeg.some(([a,b])=>a===r&&b===c);
      let bg=lt?bt.L:bt.D;if(isSl)bg=lt?"#f6f769":"#baca2b";
      html+=`<div onclick="puzClick(${r},${c})" class="sq" style="width:${cs}px;height:${cs}px;background:${bg};">`;
      if(isL&&!p)html+=`<div class="ldot" style="width:${cs*.28}px;height:${cs*.28}px;"></div>`;
      if(isL&&p)html+=`<div class="lring" style="border:${Math.max(3,cs*.09)}px solid rgba(0,0,0,.28);"></div>`;

      html+=`</div>`;
    }html+=`</div>`;}
  wrap._cs=cs;wrap.innerHTML=html;
}
function puzClick(r,c){
  if(G.puzSolved)return;const board=G.puzBoard;
  if(G.puzSel){
    if(G.puzLeg.some(([a,b])=>a===r&&b===c)){
      const sol=G.puzData.solution[0];
      const ok=sol[0]===G.puzSel[0]&&sol[1]===G.puzSel[1]&&sol[2]===r&&sol[3]===c;
      const res=applyMove(board,G.puzSel[0],G.puzSel[1],r,c,G.puzEp,G.puzCs);
      G.puzBoard=res.board;G.puzSel=null;G.puzLeg=[];
      renderPuzBoard(document.getElementById("puzBrd")?._cs||42);
      const msg=document.getElementById("puzMsg");
      if(ok){
        G.puzSolved=true;const puz=PUZZLES.find(p=>p.id===G.puzId);const isNew=!G.puzDone.includes(G.puzId);
        if(isNew){G.puzDone.push(G.puzId);G.coins+=puz.reward;G.totalEarned+=puz.reward;saveD();}
        if(msg)msg.innerHTML=`<div style="color:#4ade80;animation:popIn .3s ease;">✅ ${G.puzData.solDesc}</div>`;
        const bd=document.getElementById("puzBrd");
        if(bd){const rr=bd.getBoundingClientRect();particles(rr.left+rr.width/2,rr.top+rr.height/2,["✨","🌟","⭐","🎯"]);}
        checkAchs();
        setTimeout(()=>{document.querySelectorAll(".puzOv").forEach(e=>e.remove());renderPuzzles();if(isNew)toast(`✅ Solved! +${puz?.reward||15}🪙`,"win");},1700);
      }else{
        if(msg)msg.innerHTML=`<div style="color:#fca5a5;animation:spin .3s ease;">❌ Galat – dobara try karo!</div>`;
        setTimeout(()=>openPuzzle(G.puzId),900);
      }
      return;
    }
    if(board[r][c]?.c===G.puzTurn){G.puzSel=[r,c];G.puzLeg=legal(board,r,c,G.puzEp,G.puzCs);renderPuzBoard(document.getElementById("puzBrd")?._cs||42);return;}

  }
}

let _aiT=null;
function initBoard(){
  const b=Array(8).fill(null).map(()=>Array(8).fill(null));
  ["R","N","B","Q","K","B","N","R"].forEach((t2,i)=>{b[0][i]={t:t2,c:"b"};b[7][i]={t:t2,c:"w"};});
  for(let i=0;i<8;i++){b[1][i]={t:"P",c:"b"};b[6][i]={t:"P",c:"w"};}
  return b;
}
function startGame(mode,diff_arg,_x,level){
  G.mode=mode;G.curLvl=level||null;G.diff=level?LEVELS[level-1].diff:(diff_arg||"medium");
  G.board=initBoard();G.sel=null;G.leg=[];G.turn="w";G.ep=null;
  G.cs={wK:true,wQ:true,bK:true,bQ:true};G.status="playing";G.aiOn=false;
  G.lastMv=null;G.capW=[];G.capB=[];G.hist=[];G.hint=null;G.moveLog=[];G.revOpen=false;
  G.savedGame=null;saveD();
  document.getElementById("resultOv")?.remove();document.getElementById("revPanel")?.remove();
  go("pgGame");renderGameUI();renderBoard();
}
function resumeGame(){
  if(!G.savedGame)return;
  const sg=G.savedGame;
  Object.assign(G,{board:sg.board,ep:sg.ep,cs:sg.cs,turn:sg.turn,capW:sg.capW||[],capB:sg.capB||[],moveLog:sg.moveLog||[],mode:sg.mode,diff:sg.diff,curLvl:sg.curLvl,sel:null,leg:[],status:"playing",aiOn:false,lastMv:null,hint:null,hist:[],revOpen:false});
  go("pgGame");renderGameUI();renderBoard();toast("Game resume ho gayi! ▶","info");
}
function gameBack(){
  clearTimeout(_aiT);
  if(G.board&&G.status==="playing"&&G.moveLog.length>0){autoSave();toast("Game save ho gayi 💾","info");}
  go(G.curLvl?"pgLevels":"pgHome");
}
function resetGame(){startGame(G.mode,G.diff,null,G.curLvl);}

function renderBoard(){
  const bt=BT(),ac=bt.acc;
  const vw=Math.min(window.innerWidth,480);
  const cs=Math.min(Math.floor((vw-16)/8),58);
  const wrap=document.getElementById("boardWrap");
  wrap.style.cssText=`position:relative;line-height:0;box-shadow:0 0 0 3px ${ac}44,0 10px 50px rgba(0,0,0,.85);border-radius:2px;overflow:hidden;`;
  // review map
  const rvMap={};
  if(G.revOpen)G.moveLog.forEach(m=>{if(m.color==="w")rvMap[`${m.to[0]},${m.to[1]}`]=CI[m.classification];});
  let html="";
  for(let r=0;r<8;r++){
    html+=`<div style="display:flex;">`;
    for(let c=0;c<8;c++){
      const p=G.board[r][c],lt=(r+c)%2===0;
      const isSl=G.sel&&G.sel[0]===r&&G.sel[1]===c;
      const isL=G.leg.some(([a,b])=>a===r&&b===c);
      const isLs=G.lastMv&&((G.lastMv.from[0]===r&&G.lastMv.from[1]===c)||(G.lastMv.to[0]===r&&G.lastMv.to[1]===c));
      const isH=G.hint&&((G.hint.from[0]===r&&G.hint.from[1]===c)||(G.hint.to[0]===r&&G.hint.to[1]===c));
      const rv=rvMap[`${r},${c}`];
      let bg=lt?bt.L:bt.D;
      if(isLs)bg=lt?"#cdd26a":"#aaa23a";
      if(isSl)bg=lt?"#f6f769":"#baca2b";
      if(isH)bg=lt?"#86efac":"#166534";
      if(G.status==="check"&&p?.t==="K"&&p?.c===G.turn)bg="#dc2626";
      const isNew=G.lastMv&&G.lastMv.to[0]===r&&G.lastMv.to[1]===c;
      html+=`<div class="sq" onclick="handleCell(${r},${c})" style="width:${cs}px;height:${cs}px;background:${bg};">`;
      if(c===0)html+=`<span class="coord" style="top:2px;left:3px;color:${lt?bt.D:bt.L};">${8-r}</span>`;
      if(r===7)html+=`<span class="coord" style="bottom:2px;right:3px;color:${lt?bt.D:bt.L};">${FILES[c]}</span>`;
      if(rv)html+=`<div class="rdot" style="background:${rv.col};box-shadow:0 0 4px ${rv.col};"></div>`;
      if(isL&&!p)html+=`<div class="ldot" style="width:${cs*.3}px;height:${cs*.3}px;"></div>`;
      if(isL&&p)html+=`<div class="lring" style="border:${Math.max(3,cs*.09)}px solid rgba(0,0,0,.28);"></div>`;
      if(p){
        const scale=isSl?"scale(1.12)":"scale(1)";
        const filter=isH?"drop-shadow(0 0 8px #4ade80)":isSl?"drop-shadow(0 0 8px #ffd700)":"none";
        html+=`<div class="piece${isNew?" land":""}" style="font-size:${cs*.76}px;${getStyle(p.c)}transform:${scale};filter:${filter};">${getSym(p.c,p.t)}</div>`;
      }
      html+=`</div>`;
    }html+=`</div>`;}
  wrap.innerHTML=html;
  // Update player bars
  const bAv=document.getElementById("bAv"),wAv=document.getElementById("wAv"),a2=BT().acc;
  bAv.style.border=G.turn==="b"&&!G.aiOn?`2px solid ${a2}`:"2px solid #2a2a2a";
  bAv.style.background=G.turn==="b"&&!G.aiOn?`${a2}28`:"#1a1a1a";
  wAv.style.border=G.turn==="w"?`2px solid ${a2}`:"2px solid #2a2a2a";
  wAv.style.background=G.turn==="w"?`${a2}28`:"#1a1a1a";
  document.getElementById("capB").innerHTML=G.capB.slice(0,14).map(p=>`<span style="${getStyle(p.c)}font-size:13px;">${getSym(p.c,p.t)}</span>`).join("");
  document.getElementById("capW").innerHTML=G.capW.slice(0,14).map(p=>`<span style="${getStyle(p.c)}font-size:13px;">${getSym(p.c,p.t)}</span>`).join("");
  document.getElementById("aiBar").style.display=G.aiOn?"flex":"none";
  const cb=document.getElementById("chkBan");cb.style.display=G.status==="check"?"block":"none";
  document.getElementById("gCoins").textContent=G.coins;
  updatePill();
}

function handleCell(r,c){
  if(G.aiOn||G.status==="checkmate"||G.status==="stalemate")return;
  if(G.mode==="bot"&&G.turn!=="w")return;
  G.hint=null;
  if(G.sel){
    if(G.leg.some(([a,b])=>a===r&&b===c)){
      const evB=evalB(G.board);
      const res=applyMove(G.board,G.sel[0],G.sel[1],r,c,G.ep,G.cs);
      if(res.cap)G.capW.push(res.cap);
      G.moveLog.push({num:G.moveLog.length+1,color:G.turn,from:[G.sel[0],G.sel[1]],to:[r,c],piece:G.board[G.sel[0]][G.sel[1]],captured:res.cap||null,evalBefore:evB,evalAfter:evalB(res.board),classification:classify(evB,evalB(res.board),G.turn)});
      G.hist.push({board:cloneB(G.board),ep:G.ep,cs:{...G.cs},turn:G.turn,capW:[...G.capW],capB:[...G.capB],lastMv:G.lastMv,status:G.status});
      G.board=res.board;G.ep=res.ep;G.cs=res.cs;G.lastMv={from:G.sel,to:[r,c]};
      const nt=G.turn==="w"?"b":"w";const ns=calcSt(G.board,nt,G.ep,G.cs);
      G.status=ns;G.turn=nt;G.sel=null;G.leg=[];renderBoard();
      clearTimeout(_asSave);_asSave=setTimeout(autoSave,2500);
      if(ns==="checkmate"||ns==="stalemate"){
        const won=ns==="checkmate"&&nt==="b";
        setTimeout(()=>showResult(won,ns==="stalemate"),260);
        onEnd(won,ns==="stalemate");
      }else if(G.mode==="bot"&&nt==="b")doAI();
      return;
    }
    if(G.board[r][c]?.c===G.turn){G.sel=[r,c];G.leg=legal(G.board,r,c,G.ep,G.cs);renderBoard();return;}
    G.sel=null;G.leg=[];renderBoard();
  }else{
    if(G.board[r][c]?.c===G.turn){G.sel=[r,c];G.leg=legal(G.board,r,c,G.ep,G.cs);renderBoard();}
  }
}

function onEnd(won,draw){
  G.stats.gamesPlayed++;G.savedGame=null;
  if(won){G.stats.wins++;if(G.diff==="hard")G.stats.hardWins++;}
  else if(draw)G.stats.draws++;else G.stats.losses++;
  if(G.mode==="bot"){
    const delta=eloChange(G.elo,diffElo(G.diff),won?"win":draw?"draw":"loss");
    G.elo=Math.max(100,G.elo+delta);floatElo(delta);
  }
  if(G.curLvl&&won&&!G.completed.includes(G.curLvl)){
    const rwd=LEVELS[G.curLvl-1].reward;G.coins+=rwd;G.totalEarned+=rwd;
    G.completed.push(G.curLvl);
    const mu=Math.min(100,G.curLvl+1);if(!G.unlocked.includes(mu))G.unlocked.push(mu);
    toast(`🏆 Level ${G.curLvl} Complete! +${rwd}🪙`,"win",3000);
  }
  saveD();checkAchs();
}

// ── AI: use setTimeout to keep UI responsive ──
function doAI(){
  G.aiOn=true;renderBoard();
  clearTimeout(_aiT);
  _aiT=setTimeout(()=>{
    try{
      const ms=allMoves(G.board,"b",G.ep,G.cs);
      if(!ms.length){G.aiOn=false;renderBoard();return;}
      let mv;
      if(G.diff==="easy"){
        mv=ms[Math.floor(Math.random()*ms.length)];
      }else if(G.diff==="medium"){
        mv=getBest(G.board,"b",G.ep,G.cs,2,900);
      }else{
        // Hard: move ordering + 1.4s limit = fast AND smart
        mv=getBest(G.board,"b",G.ep,G.cs,2,1400);
      }
      if(mv){
        const res=applyMove(G.board,mv.from[0],mv.from[1],mv.to[0],mv.to[1],G.ep,G.cs);
        if(res.cap)G.capB.push(res.cap);
        const evB=evalB(G.board);
        G.moveLog.push({num:G.moveLog.length+1,color:"b",from:mv.from,to:mv.to,piece:G.board[mv.from[0]][mv.from[1]],captured:res.cap||null,evalBefore:evB,evalAfter:evalB(res.board),classification:"good"});
        G.board=res.board;G.ep=res.ep;G.cs=res.cs;G.lastMv={from:mv.from,to:mv.to};
        const ns=calcSt(G.board,"w",G.ep,G.cs);G.status=ns;G.turn="w";G.aiOn=false;
        renderBoard();
        if(ns==="checkmate"||ns==="stalemate"){
          setTimeout(()=>showResult(false,ns==="stalemate"),260);
          onEnd(false,ns==="stalemate");
        }
      }else{G.aiOn=false;renderBoard();}
    }catch(err){G.aiOn=false;renderBoard();}
  },G.diff==="easy"?50:G.diff==="medium"?80:150);
}

function doUndo(){
  if(G.coins<5){toast("Undo ke liye 5🪙 chahiye!","err");return;}
  const steps=G.mode==="bot"?2:1;
  if(G.hist.length<steps){toast("Aur moves nahi hain!","err");return;}
  const prev=G.hist[G.hist.length-steps];
  Object.assign(G,{board:prev.board,ep:prev.ep,cs:prev.cs,turn:prev.turn,capW:prev.capW,capB:prev.capB,lastMv:prev.lastMv,status:prev.status||"playing"});
  G.hist=G.hist.slice(0,-steps);G.moveLog=G.moveLog.slice(0,-steps);
  G.sel=null;G.leg=[];G.hint=null;G.revOpen=false;
  document.getElementById("resultOv")?.remove();document.getElementById("revPanel")?.remove();
  G.coins-=5;saveD();renderBoard();toast("-5🪙 • Move wapas ↩️","info");
}
function doHint(){
  if(G.coins<10){toast("Hint ke liye 10🪙 chahiye!","err");return;}
  if(G.turn!=="w"){toast("Sirf apni baari mein hint!","err");return;}
  const mv=getBest(G.board,"w",G.ep,G.cs,2,800);if(!mv){toast("Koi move nahi!","err");return;}
  G.hint=mv;G.coins-=10;saveD();renderBoard();toast("-10🪙 • Green = best move 💡","tip");
}

    <div style="font-size:64px;margin-bottom:10px;filter:drop-shadow(0 0 20px ${bt.acc});">${draw?"🤝":won?"🏆":"😤"}</div>
    <div style="font-size:24px;font-weight:800;color:${bt.acc};margin-bottom:4px;">${draw?"Draw!":won?"Jeete! 🎉":"Haare!"}</div>
    <div style="font-size:12px;color:#555;margin-bottom:6px;">ELO: <span style="color:#60a5fa;font-weight:700;">${G.elo}</span> • W${G.stats.wins}/L${G.stats.losses}/D${G.stats.draws}</div>
    <div style="margin-bottom:18px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <button onclick="resetGame()" ontouchstart="this.style.transform='scale(.95)'" ontouchend="this.style.transform='scale(1)'" style="padding:13px;border-radius:13px;background:linear-gradient(135deg,${bt.acc},${bt.acc}cc);color:#000;font-weight:800;font-size:14px;transition:transform .1s;">🔄 Dobara</button>
      <button onclick="openRevPanel()" ontouchstart="this.style.transform='scale(.95)'" ontouchend="this.style.transform='scale(1)'" style="padding:13px;border-radius:13px;border:1px solid #facc1540;background:#facc1510;color:#facc15;font-weight:700;font-size:14px;transition:transform .1s;">📊 Review</button>
    </div>
    <button onclick="gameBack()" style="width:100%;padding:11px;border-radius:13px;border:1px solid ${bt.acc}40;background:transparent;color:${bt.acc};font-weight:700;font-size:13px;">🏠 Menu</button>
  </div>`;
  document.getElementById("pgGame").appendChild(div);
  document.getElementById("turnPill").style.display="none";
}

// ── REVIEW PANEL ──
function openRevPanel(){
  document.getElementById("resultOv")?.remove();
  G.revOpen=true;renderBoard();showRevPanel();
}
function closeRevPanel(){
  G.revOpen=false;document.getElementById("revPanel")?.remove();
  document.getElementById("turnPill").style.display="block";
  updatePill();showResult(G.status==="checkmate"&&G.turn==="b",G.status==="stalemate");
}
function showRevPanel(){
  document.getElementById("revPanel")?.remove();
  const bt=BT(),ac=bt.acc;
  const wLog=G.moveLog.filter(m=>m.color==="w");
  const cnt={excellent:0,good:0,inaccuracy:0,mistake:0,blunder:0};
  wLog.forEach(m=>cnt[m.classification]=(cnt[m.classification]||0)+1);
  const score=Math.max(0,Math.round(100-((cnt.inaccuracy||0)*5+(cnt.mistake||0)*15+(cnt.blunder||0)*30)/(wLog.length||1)*10));
  const div=document.createElement("div");div.id="revPanel";
  div.style.cssText=`position:fixed;bottom:0;left:0;right:0;max-height:52vh;background:linear-gradient(180deg,#1c1c1c,#0d0d0d);border-top:2px solid ${ac}44;border-radius:24px 24px 0 0;z-index:650;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.175,.885,.32,1.275);`;
  const rows=G.moveLog.map(mv=>{
    const ci=CI[mv.classification]||CI.good,isW=mv.color==="w";
    const fr=sqN(mv.from[0],mv.from[1]),to=sqN(mv.to[0],mv.to[1]);
    const bStr=mv.bestMove&&!["excellent","good"].includes(mv.classification)&&isW?`<span style="font-size:10px;color:#60a5fa;margin-left:4px;"> 💡${sqN(mv.bestMove.from[0],mv.bestMove.from[1])}→${sqN(mv.bestMove.to[0],mv.bestMove.to[1])}</span>`:"";
    return`<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #161616;">
      <span style="font-size:10px;color:#2a2a2a;min-width:18px;">${Math.ceil(mv.num/2)}${isW?".":"…"}</span>
      <span style="${getStyle(mv.color)}font-size:14px;">${getSym(mv.color,mv.piece?.t||"P")}</span>
      <span style="font-size:12px;font-weight:${isW?700:400};color:${isW?"#ddd":"#555"};">${fr}→${to}</span>
      <span class="rv ${ci.cls}" style="margin-left:auto;">${ci.e} ${isW?ci.l:""}</span>${bStr}
    </div>`;
  }).join("");
  div.innerHTML=`<div style="padding:14px 14px 20px;">
    <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:0 auto 12px;"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <div style="flex:1;font-size:15px;font-weight:800;color:${ac};">📊 Game Review</div>
      <div style="font-size:28px;font-weight:900;color:${score>=70?"#4ade80":score>=45?"#facc15":"#f87171"};">${score}</div>
      <button onclick="closeRevPanel()" ontouchstart="this.style.transform='scale(.92)'" ontouchend="this.style.transform='scale(1)'" style="background:#1a1a1a;color:#777;border-radius:20px;padding:5px 12px;font-size:12px;transition:transform .1s;">✕</button>
    </div>
    <div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;">
      ${["excellent","good","inaccuracy","mistake","blunder"].map(k=>`<div style="flex-shrink:0;background:#141414;border-radius:10px;padding:7px 9px;text-align:center;border:1px solid ${CI[k].col}20;min-width:52px;"><div>${CI[k].e}</div><div style="font-size:16px;font-weight:800;color:${CI[k].col};">${cnt[k]||0}</div><div style="font-size:9px;color:#3a3a3a;">${CI[k].l}</div></div>`).join("")}
    </div>
    <div style="background:#111;border-radius:9px;padding:9px;font-size:11px;color:#555;margin-bottom:10px;">${score>=80?"🌟 Excellent! Pro ki tarah khele!":score>=60?"💪 Achi game! Aur practice karo.":score>=40?"📚 Kuch galtiyan – seekhte raho!":"🎯 Puzzles solve karo – tactics strong karo!"}</div>
    <div style="font-size:10px;font-weight:700;color:#2a2a2a;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;">Move by Move:</div>
    ${rows||`<div style="color:#2a2a2a;text-align:center;padding:10px;font-size:12px;">Koi moves record nahi hain.</div>`}
  </div>`;
  document.getElementById("pgGame").appendChild(div);
  document.getElementById("turnPill").style.display="none";
}

(function(){
  document.body.style.background=BT().bg;
  renderHome();renderMode();drawBg();
  window.addEventListener("resize",()=>{
    drawBg();
    if(document.getElementById("pgGame").classList.contains("on"))renderBoard();
  });
})();
</script>
